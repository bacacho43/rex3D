<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REX 3D | Esculturas Premium en Impresión 3D</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <span class="rex">REX</span><span class="d3">3D</span>
                </div>
                
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Buscar esculturas...">

                <ul class="nav-links">

            </div>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h3>ESCULTURAS PREMIUM</h3>
